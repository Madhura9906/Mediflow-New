<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
  </defs>
  <!-- Cross / plus medical icon -->
  <rect x="8" y="20" width="8" height="24" rx="2" fill="url(#g1)"/>
  <rect x="2" y="26" width="20" height="12" rx="2" fill="url(#g1)"/>
  <!-- Heartbeat line -->
  <polyline points="28,32 36,32 40,20 44,44 48,28 52,32 68,32" 
    fill="none" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- MediFlow text -->
  <text x="75" y="38" font-family="Poppins,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="url(#g1)">MediFlow</text>
</svg>
